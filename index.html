    <style>
        :root {
            --aptoide-orange: #ff6b00;
            --dark-orange: #e65a00;
            --text-dark: #222222;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--aptoide-orange);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Contenedor Principal */
        .app-card {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            text-align: center;
            position: relative;
        }

        .app-header {
            display: flex;
            gap: 15px;
            align-items: center;
            text-align: left;
            margin-bottom: 20px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .app-title h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.1;
        }

        .dev-name {
            color: var(--aptoide-orange);
            font-weight: 700;
            font-size: 12px;
            margin-top: 3px;
            display: block;
        }

        .security-badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .thanks-box {
            text-align: left;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 15px;
            border-left: 5px solid var(--aptoide-orange);
            margin-bottom: 20px;
        }

        .thanks-box p {
            margin: 0;
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }

        .install-btn {
            background-color: var(--aptoide-orange);
            color: white !important;
            text-decoration: none;
            display: block;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 20px;
            box-shadow: 0 6px 0px var(--dark-orange);
            transition: all 0.1s;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .install-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0px var(--dark-orange);
        }

        .info-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .info-item span { font-size: 10px; color: #999; display: block; }
        .info-item strong { font-size: 14px; color: var(--text-dark); }

        .sello-final {
            margin-top: 25px;
            text-align: center;
            color: white;
            position: absolute;
            bottom: -85px;
            width: 100%;
            left: 0;
        }

        .sello-box {
            border: 1.5px solid white;
            padding: 8px 20px;
            display: inline-block;
            border-radius: 8px;
            font-weight: 800;
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="app-card">

            <div class="app-title">
                <h1>Portal San Pedro Sur</h1>
                <span class="dev-name">DJKEVIN PRODUCCIONES</span>
                <div style="color: #ffb400; margin-top: 4px; font-size: 11px;">
                    <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>

            <div class="info-item">
                <span>SISTEMA</span>
                <strong>Android</strong>
            </div>
        </div>

        <div class="sello-final">
            <p style="font-size: 10px; margin-bottom: 5px; opacity: 0.9;">DISTRIBUIDO POR</p>
            <div class="sello-box">DJKEVIN PRODUCCIONES</div>
        </div>
    </div>

</body>
</html>
